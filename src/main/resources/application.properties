#==============================
# JWT CONFIG
# ===============================
# DO NOT hardcode secrets here. Configure via environment variables (e.g., Render dashboard).
# Spring Boot will also bind env var JWT_SECRET -> property jwt.secret (relaxed binding).
jwt.secret=${JWT_SECRET:}

# Backwards compatible fallbacks (old env var names) + optional overrides:
jwt.access.secret=${JWT_ACCESS_SECRET:${ACCESS_SECRET:${jwt.secret}}}
jwt.refresh.secret=${JWT_REFRESH_SECRET:${REFRESH_SECRET:${jwt.secret}}}

# Expirations in milliseconds (override via env vars; old names supported as fallback).
jwt.access.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:${ACCESS_EXPIRATION:900000}}
jwt.refresh.expiration-ms=${JWT_REFRESH_EXPIRATION_MS:${REFRESH_EXPIRATION:604800000}}
#******
# Email configuration (set via environment variables)
# Use a Brevo REST API key (typically starts with xkeysib-...), not an SMTP key.
app.brevo.api-key=${BREVO_API_KEY:}
app.email.sender-email=${EMAIL_SENDER_EMAIL:}
app.email.sender-name=${EMAIL_SENDER_NAME:QuipBill}



spring.devtools.restart.enabled=false

# ===============================
# RENDER PORT BINDING
# ===============================
# Render sets $PORT (commonly 10000). Bind to it so Render can detect an open port.
server.port=${PORT:8080}
# Ensure the server listens on all interfaces inside the container.
server.address=0.0.0.0
